<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>抓大鹅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1f2e;overflow:hidden;
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  touch-action:none;-webkit-user-select:none;user-select:none
}
canvas{display:block}

#hud{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;z-index:20;gap:8px
}
#level-text{color:#fff;font-size:15px;font-weight:700;white-space:nowrap}
#rem-wrap{color:rgba(255,255,255,.7);font-size:13px;white-space:nowrap}
#score-text{color:#FFD700;font-size:16px;font-weight:700;white-space:nowrap}
#revive-cnt{color:#ff7eb3;font-size:14px;font-weight:700;white-space:nowrap}
#btn-home,#btn-mute{
  background:none;border:none;cursor:pointer;
  font-size:20px;padding:2px 6px;border-radius:8px;
  color:#fff;opacity:.85;transition:opacity .2s;flex-shrink:0
}
#btn-home:active,#btn-mute:active{opacity:.5}

#goose-bubble{
  position:fixed;top:58px;left:50%;
  transform:translateX(-50%) translateY(-4px);
  background:#fff;border-radius:18px;
  padding:7px 16px;font-size:15px;font-weight:600;color:#333;
  box-shadow:0 4px 16px rgba(0,0,0,.22);pointer-events:none;
  z-index:25;opacity:0;transition:opacity .3s,transform .3s;
  max-width:240px;text-align:center;white-space:nowrap
}
#goose-bubble.show{opacity:1;transform:translateX(-50%) translateY(0)}
#goose-bubble::after{
  content:'';position:absolute;bottom:-9px;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;border-top-color:#fff
}

#tray-wrap{
  position:fixed;bottom:0;left:0;right:0;
  padding:8px 8px 18px;
  background:linear-gradient(0deg,rgba(0,0,0,.88) 80%,transparent);
  z-index:20
}
#tray{display:flex;justify-content:center;gap:5px;max-width:500px;margin:0 auto}
.slot{
  flex:1;max-width:56px;height:60px;
  border:2px solid rgba(255,255,255,.15);border-radius:12px;
  background:rgba(255,255,255,.06);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;position:relative;
  transition:border-color .15s,background .15s
}
.slot img{width:36px;height:36px;object-fit:contain;display:block;pointer-events:none}
.slot.filled{border-color:rgba(255,255,255,.4)}
.slot-label{font-size:9px;color:rgba(255,255,255,.65);margin-top:2px;line-height:1}
.slot.pop{animation:slotPop .32s ease forwards}
@keyframes slotPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.28) rotate(6deg)}
  100%{transform:scale(0) rotate(-15deg);opacity:0}
}

.match-flash{
  position:fixed;inset:0;pointer-events:none;z-index:15;
  background:rgba(255,240,80,.09);animation:mflash .35s ease-out forwards
}
@keyframes mflash{0%{opacity:1}100%{opacity:0}}

#ctrl{
  position:fixed;bottom:105px;right:12px;
  display:flex;flex-direction:column;gap:8px;z-index:20
}
.cbtn{
  width:52px;height:52px;border-radius:50%;border:none;
  font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.5);
  transition:transform .1s;-webkit-tap-highlight-color:transparent
}
.cbtn:active{transform:scale(.85)}
#btn-shake{background:linear-gradient(135deg,#ff7043,#e64a19)}
#btn-undo{background:linear-gradient(135deg,#42a5f5,#1565c0)}

/* Level select */
#scr-levels{background:radial-gradient(ellipse at 50% 40%,#1a2a4a,#0d1520)}
.lv-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
  max-width:360px;width:100%;margin:16px 0
}
.lv-btn{
  aspect-ratio:1;border-radius:14px;border:2px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;-webkit-tap-highlight-color:transparent;
  transition:transform .1s,background .15s
}
.lv-btn:active{transform:scale(.88)}
.lv-btn.unlocked{background:rgba(255,112,67,.22);border-color:#ff7043cc}
.lv-btn.last{background:linear-gradient(135deg,rgba(255,215,0,.25),rgba(255,140,0,.22));border-color:#FFD700cc}
.lv-btn .lv-num{font-size:18px;font-weight:800}
.lv-cap-tag{font-size:9px;opacity:.65;margin-top:1px}
.lv-nav{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.lv-nav button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:#fff;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer}

/* Fireworks canvas */
#fw-canvas{position:fixed;inset:0;pointer-events:none;z-index:45;display:none}

.screen{
  position:fixed;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:50;padding:24px;text-align:center
}
.screen.on{display:flex}
#scr-start{background:radial-gradient(ellipse at 50% 60%,#243b55,#141e30)}
.goose-anim{font-size:90px;animation:bob 2s ease-in-out infinite;display:block;margin-bottom:8px}
@keyframes bob{0%,100%{transform:translateY(0)rotate(-4deg)}50%{transform:translateY(-16px)rotate(4deg)}}
.scr-title{color:#fff;font-size:40px;font-weight:800;margin-bottom:8px}
.scr-sub{color:rgba(255,255,255,.55);font-size:13px;line-height:1.8;margin-bottom:28px;max-width:280px}
#scr-win{background:rgba(5,30,55,.93)}
#scr-lose{background:rgba(30,5,5,.93)}
.scr-emoji{font-size:72px;margin-bottom:12px}
.scr-h{color:#fff;font-size:26px;font-weight:700;margin-bottom:8px}
.scr-msg{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:28px}
.btn{
  padding:13px 44px;font-size:17px;font-weight:700;
  border:none;border-radius:40px;cursor:pointer;
  color:#fff;font-family:inherit;margin:5px;
  -webkit-tap-highlight-color:transparent;
  transition:transform .1s;box-shadow:0 6px 20px rgba(0,0,0,.4)
}
.btn:active{transform:scale(.92)}
.btn-primary{background:linear-gradient(135deg,#ff7043,#e64a19)}
.btn-secondary{background:linear-gradient(135deg,#42a5f5,#1565c0)}

#toast{
  position:fixed;top:55px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.78);color:#fff;font-size:14px;
  padding:6px 18px;border-radius:20px;pointer-events:none;
  z-index:60;opacity:0;transition:opacity .25s;white-space:nowrap
}
#toast.on{opacity:1}

/* ── Auth & Leaderboard screens ──────────────────────────── */
#scr-auth{background:radial-gradient(ellipse at 50% 60%,#1a2a4a,#0a1020)}
#scr-leader{background:radial-gradient(ellipse at 50% 40%,#1a2040,#0d1025)}
.auth-box{
  background:rgba(0,0,0,.52);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);border-radius:24px;
  padding:28px 22px 20px;width:min(340px,90vw);
  display:flex;flex-direction:column;align-items:center;gap:10px
}
.segmented{
  display:flex;background:rgba(255,255,255,.08);
  border-radius:20px;padding:4px;gap:2px;width:100%
}
.seg-btn{
  flex:1;padding:8px 0;border-radius:16px;border:none;
  background:transparent;color:rgba(255,255,255,.5);
  font-size:14px;cursor:pointer;font-family:inherit;
  font-weight:700;transition:all .2s
}
.seg-btn.active{background:rgba(255,255,255,.2);color:#fff}
.ainput{
  width:100%;padding:11px 16px;border-radius:12px;
  border:1.5px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);color:#fff;
  font-size:15px;font-family:inherit;outline:none;transition:border-color .2s
}
.ainput:focus{border-color:rgba(255,112,67,.7)}
.ainput::placeholder{color:rgba(255,255,255,.3)}
#aform-login,#aform-reg{width:100%;display:flex;flex-direction:column;gap:8px}
#aform-reg{display:none}
#auth-err{color:#ff7777;font-size:13px;min-height:18px;text-align:center;width:100%}
.lb-box{
  background:rgba(0,0,0,.48);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);border-radius:20px;
  padding:22px 18px 18px;width:min(360px,92vw);
  display:flex;flex-direction:column;align-items:center;gap:10px
}
#lb-list{overflow-y:auto;max-height:46vh;width:100%;display:flex;flex-direction:column;gap:5px}
.lb-row{
  color:#fff;font-size:14px;padding:10px 14px;
  background:rgba(255,255,255,.07);border-radius:11px;
  display:flex;align-items:center;gap:8px
}
.lb-rank{font-weight:700;font-size:15px;min-width:26px;text-align:center;flex-shrink:0}
.lb-user{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-val{color:#FFD700;font-weight:700;font-size:14px;flex-shrink:0}
#lb-level-pick{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;padding:7px 14px;border-radius:11px;
  font-size:13px;font-family:inherit;outline:none
}
#lb-level-pick option{background:#1a2040;color:#fff}
</style>
</head>
<body>

<div id="hud">
  <button id="btn-home">🏠</button>
  <span id="level-text">第1关</span>
  <span id="rem-wrap">剩 <b id="rem-n">0</b> 件</span>
  <span id="score-text">🏆 0</span>
  <span id="revive-cnt">💊×2</span>
  <button id="btn-mute">🔊</button>
</div>

<div id="goose-bubble"></div>
<canvas id="c"></canvas>
<div id="tray-wrap"><div id="tray"></div></div>

<div id="ctrl">
  <button class="cbtn" id="btn-shake" title="颠锅">🍳</button>
  <button class="cbtn" id="btn-undo"  title="撤回">↩️</button>
</div>

<div class="screen on" id="scr-start">
  <span class="goose-anim">🪿</span>
  <div class="scr-title">抓大鹅</div>
  <p class="scr-sub">
    点击物品放入暂存栏<br>
    凑齐 <b style="color:#FFD700">3 个相同</b>即可消除<br>
    消光所有物品 → 抓住大鹅！<br>
    🍳 摇晃手机或点颠锅翻底层
  </p>
  <button class="btn btn-primary" id="btn-continue" style="display:none">▶ 继续游戏</button>
  <button class="btn btn-primary" id="btn-start">新游戏</button>
  <button class="btn btn-secondary" id="btn-open-levels">🗺 选择关卡</button>
  <button class="btn" id="btn-show-leaderboard" style="background:linear-gradient(135deg,#f9a825,#e65100)">🏆 排行榜</button>
  <button class="btn" id="btn-show-auth" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);font-size:14px;padding:10px 32px;box-shadow:none">👤 登录/注册</button>
</div>

<!-- Level select screen -->
<div class="screen" id="scr-levels">
  <div class="scr-title" style="font-size:28px;margin-bottom:4px">选择关卡</div>
  <div class="lv-nav">
    <button id="btn-lv-prev">◀</button>
    <span id="lv-page" style="color:rgba(255,255,255,.6);font-size:14px"></span>
    <button id="btn-lv-next">▶</button>
  </div>
  <div class="lv-grid" id="lv-grid"></div>
  <button class="btn btn-secondary" id="btn-lv-close" style="margin-top:8px">← 返回</button>
</div>

<!-- Fireworks canvas (2D overlay) -->
<canvas id="fw-canvas"></canvas>

<div class="screen" id="scr-win">
  <div class="scr-emoji">🎉</div>
  <div class="scr-h">抓到了！</div>
  <p class="scr-msg" id="win-msg">太棒了！</p>
  <button class="btn btn-primary" id="btn-next">下一关 →</button>
  <button class="btn btn-secondary" id="btn-retry2">再玩一次</button>
</div>

<div class="screen" id="scr-lose">
  <div class="scr-emoji">😅</div>
  <div class="scr-h">暂存栏满了！</div>
  <p class="scr-msg">大鹅跑了……再来一次？</p>
  <button class="btn btn-primary" id="btn-revive" style="background:linear-gradient(135deg,#e91e63,#c2185b)">💊 复活 (剩余×2)</button>
  <button class="btn btn-secondary" id="btn-retry">重新挑战</button>
</div>

<!-- Auth screen -->
<div class="screen" id="scr-auth">
  <div class="auth-box">
    <div style="font-size:56px;line-height:1.2;animation:bob 2s ease-in-out infinite">🪿</div>
    <div style="color:#fff;font-size:22px;font-weight:800">抓大鹅</div>
    <div class="segmented">
      <button class="seg-btn active" id="atab-login-btn">登录</button>
      <button class="seg-btn" id="atab-reg-btn">注册</button>
    </div>
    <div id="aform-login">
      <input class="ainput" id="a-email" type="email" placeholder="邮箱" autocomplete="email">
      <input class="ainput" id="a-pass" type="password" placeholder="密码" autocomplete="current-password">
      <button class="btn btn-primary" id="btn-do-login" style="width:100%;padding:12px;margin:2px 0">登录</button>
    </div>
    <div id="aform-reg">
      <input class="ainput" id="a-uname" type="text" placeholder="用户名（2~16位）" autocomplete="username">
      <input class="ainput" id="a-email2" type="email" placeholder="邮箱" autocomplete="email">
      <input class="ainput" id="a-pass2" type="password" placeholder="密码（至少6位）" autocomplete="new-password">
      <button class="btn btn-primary" id="btn-do-reg" style="width:100%;padding:12px;margin:2px 0">注册</button>
    </div>
    <p id="auth-err"></p>
    <button class="btn" id="btn-auth-skip" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:13px;padding:9px 28px;box-shadow:none;color:rgba(255,255,255,.7)">跳过 · 游客模式</button>
  </div>
</div>

<!-- Leaderboard screen -->
<div class="screen" id="scr-leader">
  <div class="lb-box">
    <div style="color:#fff;font-size:22px;font-weight:800">🏆 排行榜</div>
    <div class="segmented">
      <button class="seg-btn active" id="lbtab-score-btn">最高分</button>
      <button class="seg-btn" id="lbtab-time-btn">⚡ 关卡速通</button>
    </div>
    <div id="lb-level-row" style="display:none;width:100%;text-align:center">
      <select id="lb-level-pick"></select>
    </div>
    <div id="lb-list"></div>
    <button class="btn" id="btn-lb-back" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);font-size:14px;padding:10px 32px;box-shadow:none">← 返回</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>

  {t:16, g:4, cap:4, label:'第14关'},  // 192 items, 16种
  {t:17, g:4, cap:4, label:'第15关'},  // 204 items, 全17种 — 终极挑战 🎆
];

const GOOSE_SERVER = 'http://localhost:3001/goose';

// ── Supabase Backend Config ────────────────────────────────────────
// Setup (one-time, ~5 min):
// 1. Create free project at supabase.com
// 2. Auth → Settings → disable email confirmation
// 3. SQL Editor → run this block:
//
//   create table public.profiles (
//     id uuid references auth.users(id) on delete cascade primary key,
//     username text unique not null,
//     created_at timestamptz default now()
//   );
//   create table public.progress (
//     user_id uuid references auth.users(id) on delete cascade primary key,
//     username text not null default '',
//     unlocked_level int default 0,
//     total_score int default 0,
//     updated_at timestamptz default now()
//   );
//   create table public.leaderboard (
//     id bigserial primary key,
//     user_id uuid references auth.users(id) on delete cascade,
//     username text not null,
//     level int not null,
//     time_ms int not null,
//     created_at timestamptz default now(),
//     unique(user_id, level)

//   alter table profiles   enable row level security;
//   alter table progress   enable row level security;
//   alter table leaderboard enable row level security;
//   create policy "pub_read" on profiles   for select using (true);
//   create policy "own_ins"  on profiles   for insert with check (auth.uid()=id);
//   create policy "own_upd"  on profiles   for update using (auth.uid()=id);
//   create policy "pub_read" on progress   for select using (true);
//   create policy "own_ins"  on progress   for insert with check (auth.uid()=user_id);
//   create policy "own_upd"  on progress   for update using (auth.uid()=user_id);
//   create policy "pub_read" on leaderboard for select using (true);
//   create policy "own_ins"  on leaderboard for insert with check (auth.uid()=user_id);
//   create policy "own_upd"  on leaderboard for update using (auth.uid()=user_id);
//
// 4. Settings → API → copy Project URL and anon/public key:
const SB_URL = '';  // 'https://xxxxxxxx.supabase.co'
const SB_KEY = '';  // anon public key

// ── Auth / backend runtime state ──────────────────────────────────
let sb = null;        // Supabase client (null = not configured)
let sbUser = null;    // logged-in user object
let sbUsername = '';  // display name
let _lbMode = 'score'; // leaderboard view: 'score' | 'time'
let _lvStart = 0;     // Date.now() when current level began
const FALLBACK = {
  pickup:    ['哼，被拿走了', '嘎！', '放下！', '别动！'],

// ── LocalStorage progress (always-on guest fallback) ──────────────
function lsSave() {
  const nextLv = Math.min(G.level + 1, LEVELS.length - 1);
  try { localStorage.setItem('goose_pg', JSON.stringify({ nextLv, score: G.score })); } catch(e){}
}
function lsLoad() {
  try {
    const d = JSON.parse(localStorage.getItem('goose_pg') || 'null');
    if (d?.nextLv > 0) {
      G.level = d.nextLv; G.score = d.score || 0;
      syncScore(); updateStartBtns();
      setTimeout(() => toast(`📱 上次进度：第${G.level+1}关，继续加油！`), 700);
    }
  } catch(e) {}
}
function updateStartBtns() {
  const cb = document.getElementById('btn-continue');
  if (!cb) return;
  if (G.level > 0) {
    cb.textContent = `▶ 继续第${G.level+1}关`;
    cb.style.display = '';
  } else {
    cb.style.display = 'none';
  }
}

// ── Supabase init ──────────────────────────────────────────────────
async function initSB() {
  if (!SB_URL || !SB_KEY) { lsLoad(); return; }
  try {
    sb = window.supabase.createClient(SB_URL, SB_KEY);
    const { data: { session } } = await sb.auth.getSession();
    if (session) { sbUser = session.user; await _sbLoadAll(); }
    else { lsLoad(); }
    sb.auth.onAuthStateChange(async (_ev, sess) => {
      if (sess) { sbUser = sess.user; await _sbLoadAll(); }
      else { sbUser = null; sbUsername = ''; _updateAuthBtn(); }
    });
  } catch(e) { console.warn('[SB init]', e); lsLoad(); }
}

async function _sbLoadAll() {
  try {
    const { data: p } = await sb.from('profiles').select('username').eq('id', sbUser.id).maybeSingle();
    sbUsername = p?.username || sbUser.email?.split('@')[0] || '玩家';
    _updateAuthBtn();
    const { data: pr } = await sb.from('progress')
      .select('unlocked_level,total_score').eq('user_id', sbUser.id).maybeSingle();
    if (pr?.unlocked_level > 0) {
      G.level = Math.max(G.level, pr.unlocked_level);
      G.score = pr.total_score || 0;
      syncScore(); updateStartBtns();
      setTimeout(() => toast(`✅ ${sbUsername}，已恢复第${G.level+1}关！`), 700);
    }
  } catch(e) { console.warn('[SB load]', e); }
}

function _updateAuthBtn() {
  const btn = document.getElementById('btn-show-auth');
  if (!btn) return;
  if (sbUsername) {
    btn.textContent = `👤 ${sbUsername}`;
    btn.style.background = 'rgba(76,175,80,.28)';
    btn.style.borderColor = 'rgba(76,175,80,.4)';
  } else {
    btn.textContent = '👤 登录/注册';
    btn.style.background = 'rgba(255,255,255,.12)';
    btn.style.borderColor = 'rgba(255,255,255,.2)';
  }
}

function _sbSetErr(msg) {
  const el = document.getElementById('auth-err');
  if (el) el.textContent = msg;
}

// ── Auth actions ───────────────────────────────────────────────────
async function sbDoLogin(email, pass) {
  _sbSetErr('');
  if (!email || !pass) { _sbSetErr('请填写邮箱和密码'); return false; }
  const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pass });
  if (error) { _sbSetErr(error.message); return false; }
  updateStartBtns(); showScr('scr-start');
  return true;
}

async function sbDoRegister(email, pass, uname) {
  _sbSetErr('');
  const name = uname.trim();
  if (name.length < 2 || name.length > 16) { _sbSetErr('用户名需2~16个字符'); return false; }
  if (pass.length < 6) { _sbSetErr('密码至少6位'); return false; }
  if (!email) { _sbSetErr('请填写邮箱'); return false; }
  const { data, error } = await sb.auth.signUp({ email: email.trim(), password: pass });
  if (error) { _sbSetErr(error.message); return false; }
  if (data?.user) {
    try {
      await sb.from('profiles').insert({ id: data.user.id, username: name });
      await sb.from('progress').insert({ user_id: data.user.id, username: name, unlocked_level: 0, total_score: 0 });
    } catch(e) {}
  }
  toast('注册成功！如需验证邮箱请查收邮件');
  updateStartBtns(); showScr('scr-start');
  return true;
}

async function sbDoLogout() {
  if (!sb) return;
  await sb.auth.signOut();
  sbUser = null; sbUsername = '';
  _updateAuthBtn();
  toast('已退出登录');
}

// ── Save win progress + personal best ─────────────────────────────
async function sbSaveWin(level, timeMs) {
  lsSave(); // always persist to localStorage
  if (!sb || !sbUser) return;
  try {
    const nextLv = Math.min(level + 1, LEVELS.length - 1);
    await sb.from('progress').upsert({
      user_id: sbUser.id, username: sbUsername,
      unlocked_level: nextLv, total_score: G.score,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });

    const { data: ex } = await sb.from('leaderboard')
      .select('time_ms').eq('user_id', sbUser.id).eq('level', level).maybeSingle();
    if (!ex || timeMs < ex.time_ms) {
      await sb.from('leaderboard').upsert({
        user_id: sbUser.id, username: sbUsername, level, time_ms: timeMs
      }, { onConflict: 'user_id,level' });
      if (ex) setTimeout(() => toast(`🏆 第${level+1}关新纪录！${_fmtMs(timeMs)}`), 1400);
    }
  } catch(e) { console.warn('[SB save]', e); }
}

function _fmtMs(ms) {
  const s = ms / 1000;
  return s < 60 ? `${s.toFixed(1)}s` : `${(s/60|0)}m${(s%60|0)}s`;
}

// ── Leaderboard ────────────────────────────────────────────────────
async function openLeaderboard() {
  const sel = document.getElementById('lb-level-pick');
  if (sel && !sel.options.length)
    LEVELS.forEach((lv, i) => sel.add(new Option(lv.label, i)));

async function _renderLB() {
  const list = document.getElementById('lb-list');
  if (!sb) {
    list.innerHTML = '<div style="color:rgba(255,255,255,.4);padding:24px;text-align:center">请先配置 Supabase 后端<br><small style="font-size:11px;opacity:.6">填写 SB_URL 和 SB_KEY 常量</small></div>';
    return;
  }
  list.innerHTML = '<div style="color:rgba(255,255,255,.35);padding:20px;text-align:center">加载中…</div>';
  try {
    let rows = [];
    if (_lbMode === 'score') {
      const { data } = await sb.from('progress')
        .select('username,total_score').order('total_score', { ascending:false }).limit(10);
      rows = (data||[]).map((r,i) => ({ i, u: r.username||'?', v:`${r.total_score} 分` }));
    } else {
      const lv = parseInt(document.getElementById('lb-level-pick')?.value || '0');
      const { data } = await sb.from('leaderboard')
        .select('username,time_ms').eq('level', lv)
        .order('time_ms', { ascending:true }).limit(10);
      rows = (data||[]).map((r,i) => ({ i, u: r.username||'?', v: _fmtMs(r.time_ms) }));
    }
    const medals = ['🥇','🥈','🥉'];
    list.innerHTML = rows.length
      ? rows.map(r => `<div class="lb-row"><span class="lb-rank">${medals[r.i]||r.i+1}</span><span class="lb-user">${r.u}</span><span class="lb-val">${r.v}</span></div>`).join('')
      : '<div style="color:rgba(255,255,255,.35);padding:20px;text-align:center">暂无记录</div>';
  } catch(e) {
    list.innerHTML = '<div style="color:#ff8080;padding:20px;text-align:center">加载失败，请重试</div>';
  }
}

// ── Geometry helpers ──────────────────────────────────────────────
function matL(color) { return new THREE.MeshLambertMaterial({color}); }
function mk(geo, color) { const m = new THREE.Mesh(geo, matL(color)); m.castShadow = true; m.receiveShadow = true; return m; }
function sp(r, c, sw=10, sh=8) { return mk(new THREE.SphereGeometry(r,sw,sh), c); }
function cy(rt, rb, h, c, s=8) { return mk(new THREE.CylinderGeometry(rt,rb,h,s), c); }
function co(r, h, c, s=8)      { return mk(new THREE.ConeGeometry(r,h,s), c); }
function bx(w, h, d, c)        { return mk(new THREE.BoxGeometry(w,h,d), c); }

// ── Tray thumbnail renderer (mini WebGL render, cached per type) ──
let _tR = null, _tS = null, _tC = null;
const _tCache = {};

function _initThumbs() {
  const cv = document.createElement('canvas');
  cv.width = 72; cv.height = 72;
  _tR = new THREE.WebGLRenderer({canvas:cv, antialias:true, alpha:true});
  _tR.setClearColor(0, 0);
  _tR.setSize(72, 72);
  _tS = new THREE.Scene();
  _tC = new THREE.PerspectiveCamera(36, 1, 0.1, 20);
  _tC.position.set(0.2, 0.5, 2.9); _tC.lookAt(0, 0.05, 0);
  _tS.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dl = new THREE.DirectionalLight(0xFFF0D0, 1.0);
  dl.position.set(2, 4, 3); _tS.add(dl);
  const dl2 = new THREE.DirectionalLight(0xAABBFF, 0.45);
  dl2.position.set(-2, 1, 2); _tS.add(dl2);
}

function getThumb(typeIdx) {
  if (_tCache[typeIdx]) return _tCache[typeIdx];
  if (!_tR) _initThumbs();
  const g = BUILDERS[typeIdx]();
  g.scale.setScalar(2.1); g.rotation.y = 0.4; g.rotation.x = -0.18;
  _tS.add(g);
  _tR.render(_tS, _tC);
  _tS.remove(g);
  g.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
  _tCache[typeIdx] = _tR.domElement.toDataURL('image/png');
  return _tCache[typeIdx];
}

function petGooseAnim() {
  if (!petGoose || petGoose._hopping) return;
  petGoose._hopping = true;
  sfxGoose();
  const base = petGoose.position.clone();
  const baseRY = petGoose.rotation.y;
  const t0 = performance.now();
  function hop(now) {
    const dt = (now - t0) / 1000;
    if (dt < 0.7) {
      petGoose.position.y = base.y + Math.abs(Math.sin(dt * Math.PI / 0.7)) * 0.45;
      petGoose.rotation.z = Math.sin(dt * Math.PI * 4) * 0.35;
      petGoose.rotation.y = baseRY + Math.sin(dt * Math.PI * 2) * 0.8;
      petGoose.scale.setScalar(0.42 + Math.abs(Math.sin(dt*Math.PI/0.7))*0.08);
      requestAnimationFrame(hop);
    } else {
      petGoose.position.copy(base);
      petGoose.rotation.set(0, baseRY, 0);
      petGoose.scale.setScalar(0.42);
      petGoose._hopping = false;
    }
  }
  requestAnimationFrame(hop);
}

// ── Fireworks (2D canvas overlay) ─────────────────────────────────
function launchFireworks() {
  const fwc = document.getElementById('fw-canvas');
  fwc.width = innerWidth; fwc.height = innerHeight;
  fwc.style.display = 'block';
  const ctx = fwc.getContext('2d');
  const COLORS = ['#FF4444','#44FF88','#4488FF','#FFD700','#FF44FF','#44FFFF','#FF8844','#FFFFFF'];
  const particles = [];

  function burst(x, y) {
    const color = COLORS[Math.floor(Math.random()*COLORS.length)];
    for (let i = 0; i < 52; i++) {
      const a = Math.random() * Math.PI * 2;
      const spd = 1.5 + Math.random() * 4.5;
      particles.push({
        x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
        life: 1, decay: 0.012 + Math.random()*0.018,
        size: 2 + Math.random()*3, color,
        trail: [], gravity: 0.07,
      });
    }
  }

  // Schedule 8 bursts
  const positions = [
    [0.25,0.25],[0.75,0.25],[0.5,0.18],[0.2,0.5],
    [0.8,0.45],[0.5,0.35],[0.35,0.15],[0.65,0.55],
  ];
  positions.forEach(([rx,ry], i) =>
    setTimeout(() => burst(innerWidth*rx, innerHeight*ry), i*380));

  let fwT = performance.now();
  function drawFW(now) {
    const dt = Math.min((now - fwT)/16.67, 3);
    fwT = now;
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, fwc.width, fwc.height);
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.trail.push({x:p.x, y:p.y, life:p.life});
      if (p.trail.length > 5) p.trail.shift();
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vy += p.gravity*dt;
      p.vx *= 0.98; p.vy *= 0.98;
      p.life -= p.decay*dt;
      if (p.life <= 0) { particles.splice(i,1); continue; }
      // Trail
      for (let j = 0; j < p.trail.length; j++) {
        const tr = p.trail[j];
        ctx.globalAlpha = (tr.life * j/p.trail.length) * 0.4;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(tr.x, tr.y, p.size*0.5, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (particles.length > 0 || (now - fwT) < 3500) {
      requestAnimationFrame(drawFW);
    } else {
      ctx.clearRect(0,0,fwc.width,fwc.height);
      fwc.style.display = 'none';
    }
  }
  requestAnimationFrame(drawFW);
}

// Inverted-hull white outline: slightly enlarged backface mesh on each sub-mesh
function addOutlines(grp) {
  const outMat = new THREE.MeshBasicMaterial({
    color: 0xFFFFFF, side: THREE.BackSide, transparent: true, opacity: 0.78,
  });
  const meshes = [];
  grp.traverse(c => { if (c.isMesh) meshes.push(c); });
  for (const m of meshes) {
    const o = new THREE.Mesh(m.geometry, outMat);
    o.scale.setScalar(1.08);
    m.add(o);
  }
}

class Item {

    this.typeIdx = typeIdx;

    this.type = ti.id; this.label = ti.label; this.emoji = ti.e;
    this.id = Math.random().toString(36).slice(2,9);

    addOutlines(this.group);

  }
  addToScene(pos) { if (pos) this.group.position.copy(pos); scene.add(this.group); this.inPile = true; }
  removeFromScene() { scene.remove(this.group); this.inPile = false; }
}

function buildWok() {

  const ironMat = new THREE.MeshLambertMaterial({color: 0x1C0E08, side: THREE.DoubleSide});
  const darkMat = new THREE.MeshLambertMaterial({color: 0x141010});

  // Inner bowl: parabolic LatheGeometry matching physics formula
  const innerPts = [];
  for (let i = 0; i <= 32; i++) {
    const t = i / 32;
    innerPts.push(new THREE.Vector2(t * WOK_R, WOK_BOT + WOK_D * t * t));
  }

  // Outer shell (thickness ~0.12)

  for (let i = 0; i <= 32; i++) {

  }
  outerPts.push(new THREE.Vector2(WOK_R + 0.12, WOK_RIM + 0.02));

  // Rim torus

  rimTor.rotation.x = Math.PI / 2;
  rimTor.position.y = WOK_RIM + 0.02;

  // Handles
  [-1, 1].forEach(s => {
    const arm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.058, 0.058, 0.82, 8),
      rimMat
    );
    arm.rotation.z = Math.PI / 2;
    arm.position.set(s * (WOK_R + 0.48), WOK_RIM - 0.14, 0);
    scene.add(arm);
    const loop = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.058, 8, 18), rimMat);
    loop.rotation.z = Math.PI / 2;
    loop.position.set(s * (WOK_R + 0.90), WOK_RIM - 0.14, 0);
    scene.add(loop);
  });

  // Support stand ring sitting on counter
  const stand = new THREE.Mesh(new THREE.TorusGeometry(0.58, 0.072, 8, 36), darkMat);
  stand.rotation.x = Math.PI / 2;
  stand.position.y = WOK_BOT - 0.20;
  scene.add(stand);

  // Glare highlight on rim
  const glare = new THREE.Mesh(
    new THREE.TorusGeometry(WOK_R + 0.06, 0.022, 6, 72),
    new THREE.MeshBasicMaterial({color: 0x888888, transparent: true, opacity: 0.45})

  glare.rotation.x = Math.PI / 2;
  glare.position.y = WOK_RIM + 0.13;
  scene.add(glare);
}

// ── Physics engine ────────────────────────────────────────────────
function constrainBody(b) {
  const px = b.pos.x, pz = b.pos.z;
  const r2 = px * px + pz * pz;
  const r  = Math.sqrt(r2);

  // Bowl floor (parabolic surface)
  const t = Math.min(r / WOK_R, 1.0);
  const yFloor = WOK_BOT + WOK_D * t * t + ITEM_R;
  if (b.pos.y < yFloor) {
    b.pos.y = yFloor;
    if (b.vel.y < 0) b.vel.y = -b.vel.y * BOUNCE;
    b.vel.x *= WOK_FRIC;
    b.vel.z *= WOK_FRIC;
    // Convert linear velocity into angular tumble
    b.angVel.x += (Math.random() - 0.5) * 3.2;
    b.angVel.z += (Math.random() - 0.5) * 3.2;
  }

  // Cylindrical wall — extends above rim too so items can't escape
  const wallR = WOK_R - ITEM_R;
  if (r > wallR && r > 0.001) {
    const nx = px / r, nz = pz / r;
    const pen = r - wallR;
    b.pos.x -= nx * pen;
    b.pos.z -= nz * pen;
    const vDotN = b.vel.x * nx + b.vel.z * nz;
    if (vDotN > 0) {
      b.vel.x -= (1.0 + BOUNCE) * vDotN * nx;
      b.vel.z -= (1.0 + BOUNCE) * vDotN * nz;
      b.angVel.y += (Math.random() - 0.5) * 4.5;
    }
  }
}

function resolveBodyPair(a, b) {
  const dx = b.pos.x - a.pos.x;
  const dy = b.pos.y - a.pos.y;
  const dz = b.pos.z - a.pos.z;
  // Fast early-out
  const D2 = (ITEM_R * 2) * (ITEM_R * 2);
  if (Math.abs(dx) > ITEM_R * 2 || Math.abs(dz) > ITEM_R * 2) return;
  const dist2 = dx * dx + dy * dy + dz * dz;
  if (dist2 >= D2 || dist2 < 0.0001) return;
  const dist = Math.sqrt(dist2);
  const pen  = (ITEM_R * 2 - dist) * 0.5;
  const nx = dx / dist, ny = dy / dist, nz = dz / dist;
  // Push apart
  a.pos.x -= nx * pen; a.pos.y -= ny * pen; a.pos.z -= nz * pen;
  b.pos.x += nx * pen; b.pos.y += ny * pen; b.pos.z += nz * pen;
  // Minimal impulse exchange along normal
  const dvx = b.vel.x - a.vel.x, dvy = b.vel.y - a.vel.y, dvz = b.vel.z - a.vel.z;
  const vn = dvx * nx + dvy * ny + dvz * nz;
  if (vn < 0) {
    const imp = vn * (1.0 + BOUNCE) * 0.5;
    a.vel.x += imp * nx; a.vel.y += imp * ny; a.vel.z += imp * nz;
    b.vel.x -= imp * nx; b.vel.y -= imp * ny; b.vel.z -= imp * nz;
    // Spin transfer
    a.angVel.x += (Math.random() - 0.5) * 2.2;
    b.angVel.z += (Math.random() - 0.5) * 2.2;
  }
}

function physicsStep(dt) {
  if (!G.running || G.bodies.length === 0) return;
  const dts = Math.min(dt, 0.035); // clamp for stability
  const ANG_DAMP = 0.88;
  const LIN_DAMP = 0.985;

  for (const b of G.bodies) {
    if (b.item.animating) continue;
    // Gravity
    b.vel.y -= GRAV * dts;
    // Integrate position
    b.pos.x += b.vel.x * dts;
    b.pos.y += b.vel.y * dts;
    b.pos.z += b.vel.z * dts;
    // Damping
    b.vel.x *= LIN_DAMP;
    b.vel.z *= LIN_DAMP;
    b.angVel.x *= ANG_DAMP;
    b.angVel.y *= ANG_DAMP;
    b.angVel.z *= ANG_DAMP;
    // Bowl constraint
    constrainBody(b);
    // Apply angular velocity to mesh rotation
    b.item.group.rotation.x += b.angVel.x * dts;
    b.item.group.rotation.y += b.angVel.y * dts;
    b.item.group.rotation.z += b.angVel.z * dts;
    // Sync mesh position
    b.item.group.position.copy(b.pos);
  }

  // Collision resolution (O(n²) with early reject)
  const n = G.bodies.length;
  for (let i = 0; i < n - 1; i++) {
    if (G.bodies[i].item.animating) continue;
    for (let j = i + 1; j < n; j++) {
      if (G.bodies[j].item.animating) continue;
      resolveBodyPair(G.bodies[i], G.bodies[j]);
    }
  }
}

function processSpawnQueue(now) {
  if (spawnQ.length === 0) return;
  const ready = [];
  const remaining = [];
  for (const entry of spawnQ) {
    if (now >= entry.t) ready.push(entry);
    else remaining.push(entry);
  }
  spawnQ = remaining;

  for (const {item} of ready) {
    const ang = Math.random() * Math.PI * 2;
    const rad = Math.random() * WOK_R * 0.55;
    const spawnX = Math.cos(ang) * rad;
    const spawnZ = Math.sin(ang) * rad;
    const spawnY = WOK_RIM + 1.5 + Math.random() * 2.0;
    item.addToScene(new THREE.Vector3(spawnX, spawnY, spawnZ));
    item.group.scale.setScalar(1.6);
    item.group.rotation.set(
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2
    );
    const body = {
      item,
      pos: new THREE.Vector3(spawnX, spawnY, spawnZ),
      vel: new THREE.Vector3(
        (Math.random() - 0.5) * 0.8,
        -(0.5 + Math.random() * 1.5),
        (Math.random() - 0.5) * 0.8
      ),
      angVel: new THREE.Vector3(
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 6
      ),
    };
    G.bodies.push(body);
  }
}

// ── Tween system ──────────────────────────────────────────────────
const tweens = [];
function tweenPos(obj, target, dur) {
  for (let i = tweens.length-1; i >= 0; i--)
    if (tweens[i].obj === obj) tweens.splice(i, 1);
  tweens.push({
    obj,
    sx:obj.position.x, sy:obj.position.y, sz:obj.position.z,
    tx:target.x, ty:target.y, tz:target.z,
    t0:performance.now(), dur:dur*1000
  });
}
function stepTweens(now) {
  for (let i = tweens.length-1; i >= 0; i--) {
    const tw = tweens[i];
    const t  = Math.min(1, (now - tw.t0) / tw.dur);
    const e  = 1 - Math.pow(1-t, 3);
    tw.obj.position.set(tw.sx+(tw.tx-tw.sx)*e, tw.sy+(tw.ty-tw.sy)*e, tw.sz+(tw.tz-tw.sz)*e);
    if (t >= 1) tweens.splice(i, 1);
  }
}

// ── Pick-up animation ─────────────────────────────────────────────
function playPickupAnim(item, onDone) {
  const g = item.group, sy = g.position.y, t0 = performance.now();
  function tick(now) {
    const dt = (now - t0) / 1000;
    if (dt < 0.09) {                       // phase 1: quick pop up (90ms)
      const p = dt / 0.09, e = 1 - Math.pow(1-p, 2);
      g.position.y = sy + e * 0.5;
      g.scale.setScalar(1 + Math.sin(p*Math.PI)*0.28);
      g.rotation.y += 0.12;
      requestAnimationFrame(tick);
    } else if (dt < 0.20) {               // phase 2: shrink into tray (110ms)
      const p = (dt - 0.09) / 0.11;
      g.position.y = sy + 0.5 + p*p*0.9;
      g.scale.setScalar(Math.max(0.02, 1.25 - p*1.26));
      g.rotation.y += 0.15;
      requestAnimationFrame(tick);
    } else { onDone(); }
  }
  requestAnimationFrame(tick);
}

// ── Particles ─────────────────────────────────────────────────────
function spawnParticles(color) {
  const ox = (Math.random()-0.5)*2, oz = (Math.random()-0.5)*1.5;
  for (let i = 0; i < 8; i++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.07, 4, 4), new THREE.MeshBasicMaterial({color}));
    p.position.set(ox, 1.8, oz); scene.add(p);
    const a = (i/8)*Math.PI*2, spd = 0.04+Math.random()*0.04;
    const vx = Math.cos(a)*spd, vz = Math.sin(a)*spd, vy = 0.07+Math.random()*0.05;
    let t = 0;
    const iv = setInterval(() => {
      t++; p.position.x += vx; p.position.z += vz; p.position.y += vy - t*0.004;
      const s = Math.max(0, 1 - t*0.055); p.scale.setScalar(s);
      if (s < 0.01) { scene.remove(p); clearInterval(iv); }
    }, 16);
  }
}

// ── Goose speech ──────────────────────────────────────────────────
const bubbleEl = document.getElementById('goose-bubble');
let bubbleTmr = null;
function showBubble(text) {
  bubbleEl.textContent = '🪿 ' + text;
  bubbleEl.classList.add('show');
  clearTimeout(bubbleTmr);
  bubbleTmr = setTimeout(() => bubbleEl.classList.remove('show'), 3200);
}
async function gooseSpeak(event) {
  const lines = FALLBACK[event] || ['呱！'];
  const fallback = lines[Math.floor(Math.random()*lines.length)];
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 2400);
    const resp = await fetch(GOOSE_SERVER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({event}), signal: ctrl.signal
    });
    clearTimeout(tid);
    if (resp.ok) { const d = await resp.json(); if (d.text) { showBubble(d.text); return; } }
  } catch {}
  showBubble(fallback);
}

// ── Audio system ──────────────────────────────────────────────────
let AC = null, masterGain = null, bgmTimer = null, isMuted = false;

function ensureAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = AC.createGain();
  masterGain.gain.value = 0.45;
  masterGain.connect(AC.destination);
  scheduleBGM();
}

function tone(freq, dur, type, vol, delay) {
  if (!AC || isMuted) return;
  type  = type  || 'sine';
  vol   = vol   || 0.28;
  delay = delay || 0;
  const osc = AC.createOscillator(), g = AC.createGain();
  osc.connect(g); g.connect(masterGain);
  osc.type = type; osc.frequency.value = freq;
  const t = AC.currentTime + delay;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.012);
  g.gain.setValueAtTime(vol, Math.max(t + 0.013, t + dur - 0.04));
  g.gain.linearRampToValueAtTime(0, t + dur);
  osc.start(t); osc.stop(t + dur + 0.04);
}

function sfxPick()  { tone(680, 0.07, 'sine', 0.18); tone(1020, 0.1, 'sine', 0.1, 0.04); }
function sfxMatch() { [523,659,784,1047].forEach((f,i) => tone(f, 0.28, 'triangle', 0.28, i*0.09)); }
function sfxShake() {
  if (!AC || isMuted) return;
  const buf = AC.createBuffer(1, AC.sampleRate*0.22, AC.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/d.length*7);
  const src = AC.createBufferSource(); src.buffer = buf;
  const flt = AC.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 500;
  const g   = AC.createGain(); g.gain.value = 0.32;
  src.connect(flt); flt.connect(g); g.connect(masterGain);
  src.start(); src.stop(AC.currentTime + 0.22);
}
function sfxWin()  { [392,523,659,784,1047].forEach((f,i) => tone(f, 0.4, 'triangle', 0.3, i*0.11)); }
function sfxLose() { [330,294,247,220].forEach((f,i) => tone(f, 0.45, 'sawtooth', 0.15, i*0.17)); }
function sfxGoose() {
  if (!AC || isMuted) return;
  const osc = AC.createOscillator(), mod = AC.createOscillator();
  const mg  = AC.createGain(), g = AC.createGain();
  mod.frequency.value = 9; mg.gain.value = 40;
  mod.connect(mg); mg.connect(osc.frequency);
  osc.type = 'sawtooth'; osc.frequency.value = 265;
  osc.connect(g); g.connect(masterGain);
  const t = AC.currentTime;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.38, t+0.05);
  g.gain.setValueAtTime(0.38, t+0.28);
  g.gain.linearRampToValueAtTime(0, t+0.48);
  mod.start(t); osc.start(t); mod.stop(t+0.5); osc.stop(t+0.5);
}

// BGM: upbeat groove — kick + hat + bass + marimba melody @ 110 BPM
// A pentatonic minor: A C D E G

function bgmKick(t) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(130, t);
  o.frequency.exponentialRampToValueAtTime(38, t + 0.3);
  o.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(0.52, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  o.start(t); o.stop(t + 0.38);
}

function bgmHat(t, open) {
  const dur = open ? 0.13 : 0.042;
  const buf = AC.createBuffer(1, Math.round(AC.sampleRate * dur), AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6500;
  const g = AC.createGain(); g.gain.value = open ? 0.11 : 0.065;
  src.connect(hp); hp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + dur + 0.01);
}

function bgmBass(freq, t, dur) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine'; o.frequency.value = freq;
  o.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.28, t + 0.025);
  g.gain.exponentialRampToValueAtTime(0.002, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}

// Marimba: triangle fundamental + decaying 4th harmonic
function bgmMarimba(freq, t, dur, vol) {
  [[1, 0.85], [4.07, 0.18]].forEach(([mult, mix]) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = mult === 1 ? 'triangle' : 'sine';
    o.frequency.value = freq * mult;
    o.connect(g); g.connect(masterGain);
    const v = vol * mix;
    const d = mult === 1 ? dur : dur * 0.28;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(v, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.001, t + d);
    o.start(t); o.stop(t + d + 0.01);
  });
}

function scheduleBGM() {
  if (!AC) return;
  clearTimeout(bgmTimer);

  const B  = 60 / 110;   // ~0.545s per beat @ 110 BPM
  const BA = B * 4;
  const t0 = AC.currentTime + 0.1;
  const BARS = 8;

  for (let bar = 0; bar < BARS; bar++) {
    const bt = t0 + bar * BA;
    // Kick: beats 0, 2
    bgmKick(bt); bgmKick(bt + B * 2);
    // Hi-hat: every half-beat, open on beat 3.5
    for (let h = 0; h < 8; h++) bgmHat(bt + h * B * 0.5, h === 7);
    // Bass: beats 0 and 2 (walking pattern over 4 chords cycling every 2 bars)
    const bassFreqs = [[110,98],[110,130.8],[146.8,110],[130.8,98]];
    const bf = bassFreqs[Math.floor(bar / 2) % 4];
    bgmBass(bf[0], bt, B * 1.6);
    bgmBass(bf[1], bt + B * 2, B * 1.6);
  }

  // Marimba melody: catchy 8-bar phrase, A pentatonic minor
  // A4=440 C5=523.3 D5=587.3 E5=659.3 G5=784 A5=880
  const M = [
    // phrase A (bars 1-4)
    [0,   440,  B*1.0, 0.19],
    [1,   523.3,B*0.5, 0.16],
    [1.5, 587.3,B*0.5, 0.16],
    [2,   659.3,B*1.0, 0.18],
    [3,   587.3,B*0.5, 0.15],
    [3.5, 523.3,B*0.5, 0.15],
    [4,   440,  B*1.5, 0.17],
    [5.5, 392,  B*0.5, 0.14],
    [6,   440,  B*0.5, 0.15],
    [6.5, 523.3,B*0.5, 0.15],
    [7,   587.3,B*0.5, 0.16],
    [7.5, 659.3,B*0.5, 0.16],
    [8,   784,  B*0.5, 0.14],
    [8.5, 659.3,B*0.5, 0.15],
    [9,   587.3,B*1.0, 0.17],
    [10,  523.3,B*0.5, 0.15],
    [10.5,587.3,B*0.5, 0.15],
    [11,  659.3,B*1.0, 0.16],
    [12,  587.3,B*0.5, 0.15],
    [12.5,523.3,B*0.5, 0.15],
    [13,  440,  B*3.0, 0.18],
    // phrase B (bars 5-8, higher energy)
    [16,  659.3,B*1.0, 0.18],
    [17,  784,  B*0.5, 0.16],
    [17.5,880,  B*0.5, 0.14],
    [18,  784,  B*1.0, 0.16],
    [19,  659.3,B*1.0, 0.17],
    [20,  587.3,B*0.5, 0.15],
    [20.5,659.3,B*0.5, 0.15],
    [21,  784,  B*1.0, 0.16],
    [22,  659.3,B*0.5, 0.15],
    [22.5,587.3,B*0.5, 0.15],
    [23,  523.3,B*1.0, 0.16],
    [24,  440,  B*0.5, 0.15],
    [24.5,523.3,B*0.5, 0.15],
    [25,  587.3,B*0.5, 0.15],
    [25.5,659.3,B*0.5, 0.16],
    [26,  784,  B*1.0, 0.17],
    [27,  659.3,B*1.0, 0.16],
    [28,  587.3,B*0.5, 0.15],
    [28.5,523.3,B*0.5, 0.15],
    [29,  440,  B*1.0, 0.16],
    [30,  392,  B*0.5, 0.14],
    [31,  440,  B*1.0, 0.18],
  ];
  M.forEach(([beat, freq, dur, vol]) => bgmMarimba(freq, t0 + beat * B, dur, vol));

  bgmTimer = setTimeout(scheduleBGM, (BARS * BA - 0.15) * 1000);
}

function toggleMute() {
  ensureAudio();
  isMuted = !isMuted;
  if (masterGain) masterGain.gain.value = isMuted ? 0 : 0.45;
  document.getElementById('btn-mute').textContent = isMuted ? '🔇' : '🔊';
}

// ── Game state ────────────────────────────────────────────────────
const G = {
  level:0, score:0,
  items:[], tray:[], pendingPicks:0,
  goose:null, gooseOn:false,
  running:false, history:[],
  revives: 2,
  bodies: [],
  cap: 7,  // tray capacity, set per level
};

function clearLevel() {
  G.items.forEach(it => scene.remove(it.group));
  G.items = []; G.bodies = []; spawnQ = [];
  if (G.goose) { scene.remove(G.goose); G.goose = null; }
  G.tray = []; G.history = []; G.pendingPicks = 0;
  G.gooseOn = false; G.running = false;
  tweens.length = 0;
  if (hoveredItem) { hoveredItem.group.scale.setScalar(1); hoveredItem = null; }
}

function startLevel(idx) {
  _lvStart = Date.now();
  clearLevel();
  // Reset camera to top-down view immediately (no tween, screen transition covers it)
  _camTween = null;
  camera.position.set(0, 13, 2.0);
  _camLook.set(0, 0.4, 0);
  const lv = LEVELS[Math.min(idx, LEVELS.length-1)];
  G.cap = lv.cap ?? TRAY_CAP_DEFAULT;
  const pool = [];
  for (let ti = 0; ti < lv.t; ti++)
    for (let g = 0; g < lv.g; g++)
      for (let k = 0; k < 3; k++) pool.push(ti);
  shuffle(pool);

  // Build item objects (not yet in scene — spawn queue will add them)
  const now = performance.now();
  G.items = pool.map((ti, i) => {
    const item = new Item(ti);
    spawnQ.push({ item, t: now + i * 28 }); // 28 ms gap between items
    return item;
  });

  // Goose hidden at wok bottom
  G.goose = buildGooseModel();
  G.goose.scale.setScalar(0.7);
  G.goose.position.set(0, WOK_BOT + 0.45, 0);
  G.goose.visible = false;
  G.goose.traverse(c => { if (c.isMesh) c._isGoose = true; });
  G.goose._isGoose = true;
  scene.add(G.goose);

  G.running = true;
  document.getElementById('level-text').textContent = lv.label;
  rebuildTrayDOM(); updateTrayUI(); updateRem();
}

// ── Core logic ────────────────────────────────────────────────────
function pickItem(item) {
  if (!G.running || !item.inPile || item.animating) return;
  if (G.tray.length + G.pendingPicks >= G.cap) { flashTrayDanger(); return; }

  const bodyIdx = G.bodies.findIndex(b => b.item === item);
  const origBody = bodyIdx !== -1 ? {
    pos: G.bodies[bodyIdx].pos.clone(),
    vel: G.bodies[bodyIdx].vel.clone(),
    angVel: G.bodies[bodyIdx].angVel.clone(),
  } : null;
  if (bodyIdx !== -1) G.bodies.splice(bodyIdx, 1);

  G.history.push({
    item, origPos: item.group.position.clone(), origRotY: item.group.rotation.y,
    trayCopy: [...G.tray], origBody,
  });

  item.inPile = false; item.animating = true; G.pendingPicks++;
  if (hoveredItem === item) { hoveredItem.group.scale.setScalar(1.6); hoveredItem = null; }

  sfxPick();
  if (Math.random() < 0.2) gooseSpeak('pickup');

  playPickupAnim(item, () => {
    scene.remove(item.group);
    item.group.scale.setScalar(1.6);
    item.group.rotation.set(0, 0, 0);
    item.animating = false; G.pendingPicks--;

    G.tray.push(item);
    G.tray.sort((a,b) => a.typeIdx - b.typeIdx);

    const matched = consumeMatches();
    if (matched > 0) {
      G.score += 30 * matched; syncScore();
      showMatchFlash(); sfxMatch(); gooseSpeak('match');
    } else if (G.tray.length >= 5 && Math.random() < 0.35) {
      gooseSpeak('near_lose');
    }

    checkWin(); updateTrayUI(); updateRem();
    if (G.running && G.tray.length >= G.cap) setTimeout(doLose, 450);
  });
}

function pickGoose() {
  if (!G.gooseOn || !G.running) return;
  G.running = false; // block further clicks during struggle
  sfxGoose();
  toast('🪿 抓住了！！！');
  gooseSpeak('win');

  const g = G.goose, base = g.position.clone();
  const t0 = performance.now();
  function struggle(now) {
    const dt = (now - t0) / 1000;
    if (dt < 2.0) {
      const intensity = 1 - dt / 2.0;
      g.position.x = base.x + Math.sin(dt * 19) * 0.28 * intensity;
      g.position.z = base.z + Math.cos(dt * 14) * 0.22 * intensity;
      g.position.y = base.y + Math.abs(Math.sin(dt * 23)) * 0.32 * intensity;
      g.rotation.z = Math.sin(dt * 16) * 0.55 * intensity;
      g.rotation.x = Math.sin(dt * 9) * 0.35 * intensity;
      g.scale.setScalar(0.7 + Math.abs(Math.sin(dt * 13)) * 0.12);
      requestAnimationFrame(struggle);
    } else {
      g.position.copy(base); g.rotation.set(0, 0, 0); g.scale.setScalar(0.7);
      doWin();
    }
  }
  requestAnimationFrame(struggle);
}

function consumeMatches() {
  let total = 0, found = true;
  while (found) {
    found = false;
    for (let i = 0; i <= G.tray.length-3; i++) {
      if (G.tray[i].typeIdx === G.tray[i+1].typeIdx && G.tray[i+1].typeIdx === G.tray[i+2].typeIdx) {
        spawnParticles(TYPES[G.tray[i].typeIdx].color);
        G.tray.splice(i, 3);
        total++; found = true; break;
      }
    }
  }
  return total;
}

function checkWin() {
  if (G.gooseOn) return;
  if (G.bodies.length === 0 && spawnQ.length === 0 && G.pendingPicks === 0 && G.tray.length === 0) {
    G.gooseOn = true;
    G.goose.visible = true;
    // Rise above the wok rim so it's fully visible (not blocked by bowl geometry)
    tweenPos(G.goose, {x:0, y:WOK_RIM + 0.9, z:0.8}, 0.8);
    // Front-facing camera aimed at the goose's final position
    tweenCamera([0, 3.8, 9.0], [0, WOK_RIM + 0.9, 0.4], 0.9);
    toast('🪿 快去抓大鹅！');
    sfxGoose();
    gooseSpeak('win');
  }
}

function tweenCamera(toPos, toLook, dur) {
  _camTween = {
    fromPos: camera.position.clone(),
    fromLook: _camLook.clone(),
    toPos: new THREE.Vector3(...toPos),
    toLook: new THREE.Vector3(...toLook),
    dur, t0: performance.now(),
  };
}

function doWin() {
  const timeMs = Date.now() - _lvStart;
  G.running = false;
  G.score += 100 + G.level*30; syncScore();
  sbSaveWin(G.level, timeMs); // async — persists to localStorage + Supabase
  sfxWin();
  const isLast = G.level >= LEVELS.length - 1;
  document.getElementById('win-msg').textContent =
    `得分 ${G.score} 分  ⏱ ${_fmtMs(timeMs)}${isLast ? '  🏆 你是抓鹅传说！' : ''}`;
  if (isLast) setTimeout(launchFireworks, 400);
  showScr('scr-win');
}

function doLose() {
  if (!G.running) return;
  G.running = false;
  sfxLose();
  gooseSpeak('lose');
  const btn = document.getElementById('btn-revive');
  if (btn) {
    btn.textContent = `💊 复活 (剩余×${G.revives})`;
    btn.style.display = G.revives > 0 ? '' : 'none';
  }
  showScr('scr-lose');
}

function doRevive() {
  if (G.revives <= 0) return;
  G.revives--;
  document.getElementById('revive-cnt').textContent = `💊×${G.revives}`;

  // Return tray items to wok — their physics bodies were already removed on
  // pickup, so re-queue them to fall back in as if freshly spawned
  const returned = [...G.tray];
  G.tray = [];
  G.history = [];
  const now = performance.now();
  returned.forEach((item, i) => {
    item.animating = false;
    item.group.scale.setScalar(1.6);
    spawnQ.push({ item, t: now + i * 60 });
  });

  G.running = true;
  rebuildTrayDOM(); updateTrayUI(); updateRem();
  hideScrAll();
  toast('💊 复活！道具归还锅中～');
}

// ── Shake ─────────────────────────────────────────────────────────
function doShake() {
  if (!G.running) return;
  const activeBodies = G.bodies.filter(b => !b.item.animating);
  if (activeBodies.length < 2) return;
  sfxShake();
  gooseSpeak('shake');
  toast('🍳 颠锅！底层翻上来了～');

  // Apply upward impulse + lateral spin — keep items below rim height
  // Max safe upward velocity to stay inside: sqrt(2*GRAV*(WOK_RIM-WOK_BOT)) ≈ 6.9
  // Items can be stacked up to WOK_RIM, so cap at ~3.5 to keep visual chaos inside
  for (const b of activeBodies) {
    const upImpulse = 2.0 + Math.random() * 1.8; // 2.0–3.8 m/s — tumbles nicely, stays inside
    b.vel.x += (Math.random() - 0.5) * 2.2;
    b.vel.y += upImpulse;
    b.vel.z += (Math.random() - 0.5) * 2.2;
    b.angVel.x += (Math.random() - 0.5) * 12;
    b.angVel.y += (Math.random() - 0.5) * 12;
    b.angVel.z += (Math.random() - 0.5) * 12;
  }
}

// ── Undo ──────────────────────────────────────────────────────────
function doUndo() {
  if (!G.running || G.history.length === 0) return;
  if (G.items.some(it => it.animating)) return;
  const snap = G.history.pop();
  const item = snap.item;
  const ti = G.tray.indexOf(item);
  if (ti !== -1) G.tray.splice(ti, 1);
  item.group.position.copy(snap.origPos);
  item.group.rotation.set(0, snap.origRotY, 0);
  item.group.scale.setScalar(1.6);
  item.group.visible = true;
  item.animating = false;
  scene.add(item.group);
  item.inPile = true;
  // Restore physics body with slight upward nudge so it doesn't clip
  const pos = snap.origBody ? snap.origBody.pos.clone() : snap.origPos.clone();
  pos.y += 0.4;
  G.bodies.push({
    item,
    pos,
    vel: new THREE.Vector3(
      (Math.random()-0.5)*0.5, 0.8 + Math.random()*0.5, (Math.random()-0.5)*0.5
    ),
    angVel: new THREE.Vector3(
      (Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2
    ),
  });
  updateTrayUI(); updateRem();
}

// ── Tray DOM ──────────────────────────────────────────────────────
function rebuildTrayDOM() {
  const el = document.getElementById('tray'); el.innerHTML = '';
  for (let i = 0; i < G.cap; i++) {
    const s = document.createElement('div'); s.className = 'slot'; s.id = `s${i}`; el.appendChild(s);
  }
}

function updateTrayUI() {
  for (let i = 0; i < G.cap; i++) {
    const s = document.getElementById(`s${i}`); if (!s) continue;
    const item = G.tray[i];
    if (item) {
      const c = TYPES[item.typeIdx].color;
      const hex = '#' + c.toString(16).padStart(6,'0');
      const thumb = getThumb(item.typeIdx);
      s.innerHTML = `<img src="${thumb}" alt="${item.label}"><div class="slot-label">${item.label}</div>`;
      s.className = 'slot filled';
      s.style.background = hex + '28'; s.style.borderColor = hex + 'aa';
    } else {
      s.innerHTML = ''; s.className = 'slot'; s.style.background = ''; s.style.borderColor = '';
    }
  }
}

function flashTrayDanger() {
  const el = document.getElementById('tray-wrap');
  el.style.background = 'linear-gradient(0deg,rgba(255,50,50,.55) 80%,transparent)';
  setTimeout(() => el.style.background = '', 380);
}
function showMatchFlash() {
  const d = document.createElement('div'); d.className = 'match-flash';
  document.body.appendChild(d); setTimeout(() => d.remove(), 400);
}
function updateRem() {
  document.getElementById('rem-n').textContent = G.bodies.length + spawnQ.length + G.pendingPicks;
}
function syncScore() { document.getElementById('score-text').textContent = `🏆 ${G.score}`; }

// ── Screens / Toast ───────────────────────────────────────────────
function showScr(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }
function hideScrAll() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('on')); }

// ── Level select ──────────────────────────────────────────────────
let _lvPage = 0;
const LV_PER_PAGE = 5;

function renderLevelGrid() {
  const grid = document.getElementById('lv-grid');
  grid.innerHTML = '';
  const start = _lvPage * LV_PER_PAGE;
  const end = Math.min(start + LV_PER_PAGE, LEVELS.length);
  for (let i = start; i < end; i++) {
    const lv = LEVELS[i];
    const btn = document.createElement('button');
    btn.className = 'lv-btn' + (i === LEVELS.length-1 ? ' last' : ' unlocked');
    btn.innerHTML = `<span class="lv-num">${i+1}</span><span>${lv.label.replace('第','').replace('关','')+'关'}</span><span class="lv-cap-tag">托盘×${lv.cap}</span>`;
    btn.addEventListener('click', () => {
      G.score = 0; G.level = i; G.revives = 2;
      document.getElementById('revive-cnt').textContent = '💊×2';
      syncScore(); hideScrAll(); startLevel(i);
    });
    grid.appendChild(btn);
  }
  const totalPages = Math.ceil(LEVELS.length / LV_PER_PAGE);
  document.getElementById('lv-page').textContent = `${_lvPage+1} / ${totalPages}`;
  document.getElementById('btn-lv-prev').disabled = _lvPage === 0;
  document.getElementById('btn-lv-next').disabled = _lvPage >= totalPages-1;
}
let toastTmr;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(toastTmr); toastTmr = setTimeout(() => el.classList.remove('on'), 1900);
}

// ── Raycasting ────────────────────────────────────────────────────
function hitTest(cx, cy) {
  const r = renderer.domElement.getBoundingClientRect();
  const x = ((cx-r.left)/r.width)*2-1, y = -((cy-r.top)/r.height)*2+1;
  raycaster.setFromCamera({x,y}, camera);
  const meshes = [];
  G.items.forEach(it => { if (it.inPile && !it.animating) it.group.traverse(c => { if (c.isMesh) meshes.push(c); }); });
  if (G.gooseOn && G.goose && G.goose.visible) G.goose.traverse(c => { if (c.isMesh) meshes.push(c); });
  if (petGoose) petGoose.traverse(c => { if (c.isMesh) meshes.push(c); });
  if (!meshes.length) return null;
  const hits = raycaster.intersectObjects(meshes);
  if (!hits.length) return null;
  let obj = hits[0].object;
  while (obj) {
    if (obj._item) return obj._item;
    if (obj._isGoose) return 'goose';
    if (obj._isPetGoose) return 'petGoose';
    obj = obj.parent;
  }
  return null;
}

function handleClick(cx, cy) {
  ensureAudio();
  const hit = hitTest(cx, cy);
  if (!hit) return;
  if (hit === 'goose') pickGoose();
  else if (hit === 'petGoose') petGooseAnim();
  else pickItem(hit);
}

function handleHover(cx, cy) {
  if (!G.running) return;
  const hit = hitTest(cx, cy);
  const item = (hit && hit !== 'goose') ? hit : null;
  if (hoveredItem && hoveredItem !== item) { hoveredItem.group.scale.setScalar(1.6); hoveredItem = null; }
  if (item && item.inPile && !item.animating) {
    item.group.scale.setScalar(1.6 * 1.1); hoveredItem = item;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    renderer.domElement.style.cursor = (hit === 'goose' && G.gooseOn) ? 'grab' : 'default';
  }
}

// ── Input ─────────────────────────────────────────────────────────
function initInput() {
  const cv = document.getElementById('c');
  cv.addEventListener('mousemove', e => handleHover(e.clientX, e.clientY));
  cv.addEventListener('click',     e => handleClick(e.clientX, e.clientY));
  cv.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
  cv.addEventListener('touchend',   e => {
    e.preventDefault();
    const t = e.changedTouches[0]; handleClick(t.clientX, t.clientY);
  }, {passive:false});

  document.getElementById('btn-shake').addEventListener('click', () => { ensureAudio(); doShake(); });
  document.getElementById('btn-undo').addEventListener('click',  doUndo);
  document.getElementById('btn-mute').addEventListener('click',  toggleMute);

  // Home button: tap once for warning, tap again within 2s to confirm exit
  let _homeT = 0;
  document.getElementById('btn-home').addEventListener('click', () => {
    const now = Date.now();
    if (now - _homeT < 2000) {
      clearLevel();
      _lvPage = 0; renderLevelGrid();
      showScr('scr-levels');
      _homeT = 0;
    } else {
      _homeT = now;
      toast('再按一次返回选关界面');
    }
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    ensureAudio(); G.score = 0; G.level = 0; G.revives = 2;
    document.getElementById('revive-cnt').textContent = '💊×2';
    syncScore(); hideScrAll(); startLevel(0);
  });
  document.getElementById('btn-open-levels').addEventListener('click', () => {
    ensureAudio(); _lvPage = 0; renderLevelGrid(); showScr('scr-levels');
  });
  document.getElementById('btn-lv-prev').addEventListener('click', () => { _lvPage--; renderLevelGrid(); });
  document.getElementById('btn-lv-next').addEventListener('click', () => { _lvPage++; renderLevelGrid(); });
  document.getElementById('btn-lv-close').addEventListener('click', () => { updateStartBtns(); showScr('scr-start'); });
  document.getElementById('btn-revive').addEventListener('click', doRevive);
  document.getElementById('btn-next').addEventListener('click', () => {
    G.level = Math.min(G.level+1, LEVELS.length-1); hideScrAll(); startLevel(G.level);
  });
  document.getElementById('btn-retry').addEventListener('click',  () => { hideScrAll(); startLevel(G.level); });
  document.getElementById('btn-retry2').addEventListener('click', () => { hideScrAll(); startLevel(G.level); });

  // Continue saved game
  document.getElementById('btn-continue').addEventListener('click', () => {
    ensureAudio(); G.revives = 2;
    document.getElementById('revive-cnt').textContent = '💊×2';
    hideScrAll(); startLevel(G.level);
  });

  // Leaderboard
  document.getElementById('btn-show-leaderboard').addEventListener('click', () => { ensureAudio(); openLeaderboard(); });
  document.getElementById('btn-lb-back').addEventListener('click', () => { updateStartBtns(); showScr('scr-start'); });
  document.getElementById('lbtab-score-btn').addEventListener('click', () => {
    _lbMode = 'score';
    document.getElementById('lbtab-score-btn').classList.add('active');
    document.getElementById('lbtab-time-btn').classList.remove('active');
    document.getElementById('lb-level-row').style.display = 'none';
    _renderLB();
  });
  document.getElementById('lbtab-time-btn').addEventListener('click', () => {
    _lbMode = 'time';
    document.getElementById('lbtab-time-btn').classList.add('active');
    document.getElementById('lbtab-score-btn').classList.remove('active');
    document.getElementById('lb-level-row').style.display = '';
    _renderLB();
  });
  document.getElementById('lb-level-pick').addEventListener('change', _renderLB);

  // Auth screen
  let _authLogoutT = 0;
  document.getElementById('btn-show-auth').addEventListener('click', () => {
    if (sbUsername) {
      const now = Date.now();
      if (now - _authLogoutT < 2000) { sbDoLogout(); _authLogoutT = 0; }
      else { _authLogoutT = now; toast(`再按一次退出「${sbUsername}」`); }
    } else if (!sb) {
      toast('请先配置 SB_URL / SB_KEY 后重新部署');
    } else {
      document.getElementById('auth-err').textContent = '';
      document.getElementById('aform-login').style.display = 'flex';
      document.getElementById('aform-reg').style.display = 'none';
      document.getElementById('atab-login-btn').classList.add('active');
      document.getElementById('atab-reg-btn').classList.remove('active');
      showScr('scr-auth');
    }
  });

  document.getElementById('btn-auth-skip').addEventListener('click', () => { updateStartBtns(); showScr('scr-start'); });

  document.getElementById('atab-login-btn').addEventListener('click', () => {
    document.getElementById('aform-login').style.display = 'flex';
    document.getElementById('aform-reg').style.display = 'none';
    document.getElementById('atab-login-btn').classList.add('active');
    document.getElementById('atab-reg-btn').classList.remove('active');
    document.getElementById('auth-err').textContent = '';
  });
  document.getElementById('atab-reg-btn').addEventListener('click', () => {
    document.getElementById('aform-login').style.display = 'none';
    document.getElementById('aform-reg').style.display = 'flex';
    document.getElementById('atab-reg-btn').classList.add('active');
    document.getElementById('atab-login-btn').classList.remove('active');
    document.getElementById('auth-err').textContent = '';
  });

  document.getElementById('btn-do-login').addEventListener('click', async function() {
    if (!sb) { _sbSetErr('请先配置 Supabase 后端'); return; }
    this.textContent = '登录中…'; this.disabled = true;
    await sbDoLogin(
      document.getElementById('a-email').value,
      document.getElementById('a-pass').value
    );
    this.textContent = '登录'; this.disabled = false;
  });

  document.getElementById('btn-do-reg').addEventListener('click', async function() {
    if (!sb) { _sbSetErr('请先配置 Supabase 后端'); return; }
    this.textContent = '注册中…'; this.disabled = true;
    await sbDoRegister(
      document.getElementById('a-email2').value,
      document.getElementById('a-pass2').value,
      document.getElementById('a-uname').value
    );
    this.textContent = '注册'; this.disabled = false;
  });

  // Device shake → 颠锅
  // Use pure acceleration (no gravity) when available; fall back to total accel.
  // Track a rolling peak and fire on sudden spike with 600ms cooldown.
  let lx=null, ly=null, lz=null, lastShake=0, shakePeak=0;
  if (window.DeviceMotionEvent) {
    window.addEventListener('devicemotion', e => {
      const raw = e.acceleration;
      const a = (raw && raw.x !== null) ? raw : e.accelerationIncludingGravity;
      if (!a) return;
      if (lx !== null) {
        const d = Math.abs(a.x-lx) + Math.abs(a.y-ly) + Math.abs(a.z-lz);
        shakePeak = Math.max(shakePeak * 0.85, d); // rolling peak decay
        const now = Date.now();
        // Fire on spike: current delta exceeds 60% of recent peak AND threshold met
        if (d > 10 && d >= shakePeak * 0.7 && now - lastShake > 600) {
          lastShake = now; shakePeak = 0; doShake();
        }
      }
      lx=a.x; ly=a.y; lz=a.z;
    });
    document.getElementById('btn-shake').addEventListener('click', () => {
      if (typeof DeviceMotionEvent.requestPermission === 'function')
        DeviceMotionEvent.requestPermission().then(() => {}).catch(()=>{});
    });
  }
}

// ── Utility ───────────────────────────────────────────────────────
function shuffle(a) {
  for (let i=a.length-1; i>0; i--) { const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; }
}

// ── Render loop ───────────────────────────────────────────────────
let _lastNow = 0;
function loop(now) {
  requestAnimationFrame(loop);
  const dt = _lastNow > 0 ? (now - _lastNow) / 1000 : 0.016;
  _lastNow = now;
  stepTweens(now);
  // Camera tween (top-down ↔ front goose view)
  if (_camTween) {
    const p = Math.min((now - _camTween.t0) / (_camTween.dur * 1000), 1);
    const e = 1 - Math.pow(1 - p, 3); // ease out cubic
    camera.position.lerpVectors(_camTween.fromPos, _camTween.toPos, e);
    _camLook.lerpVectors(_camTween.fromLook, _camTween.toLook, e);
    if (p >= 1) _camTween = null;
  }
  camera.lookAt(_camLook);
  if (G.running) {
    processSpawnQueue(now);
    physicsStep(dt);
    // Goose bobs above wok rim when revealed
    if (G.gooseOn && G.goose && G.goose.visible && !tweens.some(t => t.obj === G.goose)) {
      G.goose.position.y = WOK_RIM + 0.9 + Math.sin(now * 0.002) * 0.13;
      G.goose.rotation.y += 0.008;
    }
    // Pet goose idle waddle
    if (petGoose && !petGoose._hopping) {
      petGoose.position.y = -0.62 + Math.sin(now * 0.0015) * 0.025;
      petGoose.rotation.z = Math.sin(now * 0.002) * 0.06;
    }
  }
  renderer.render(scene, camera);
}

// ── Boot ──────────────────────────────────────────────────────────
initThree();
rebuildTrayDOM();
initInput();
initSB(); // async — restores progress when session found
requestAnimationFrame(loop);
</script>
